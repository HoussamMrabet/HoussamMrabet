# .github/workflows/snake.yml
name: generate snake
on:
  schedule: [{ cron: "0 */12 * * *" }]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=#B5651D&color_dots=#ebedf0,#cfe8b0,#9bcd6a,#6fa83f,#4f7a2e
            dist/snake-dark.svg?color_snake=#FFB454&color_dots=#222b3a,#1f3d24,#2f6b34,#5a9b46,#8cc265
      - uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}